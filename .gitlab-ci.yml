workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

stages:
  - check
  - build
  - sync
  - test
  - deploy

variables:
  V: "0"
  MAKEFLAGS: "-j8 --no-keep-going"
  APP_BUILD: "all"
  GIT_SUBMODULE_STRATEGY: recursive
  ESP_DOCS_ENV_IMAGE: "$CI_DOCKER_REGISTRY/esp-idf-doc-env-v5.4:1-1"
  ESP_DOCS_PATH: "$CI_PROJECT_DIR"

before_script:
  # add gitlab ssh key
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo -n $GITLAB_KEY > ~/.ssh/id_rsa_base64
  - base64 --decode --ignore-garbage ~/.ssh/id_rsa_base64 > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - echo -e "Host gitlab.espressif.cn\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
  # Create insights-bins-${CI_JOB_ID}/ dir (to copy binaries into for artifacts)
  - mkdir -p $CI_PROJECT_DIR/esp-insights-bins-${CI_JOB_ID}

.setup_hardware: &setup_hardware
  - curl -o resource-pool-cli.py pn-tools.espressif.cn:5011/download-cli
  - python3 -m pip install paramiko scp esptool
  - |    
    echo "Command: python3 resource-pool-cli.py grab --user-id ${CI_JOB_ID} --resource-type ${TARGET} --wait-time 60 --timeout 3600"
    if RESOURCE_OUTPUT=$(python3 resource-pool-cli.py grab --user-id ${CI_JOB_ID} --resource-type ${TARGET} --wait-time 60 --timeout 3600); then
      echo "RESOURCE_OUTPUT: $RESOURCE_OUTPUT"
      DEVICE_IP=$(echo "$RESOURCE_OUTPUT" | grep -E "^\s*ip:" | grep -oP 'ip: \K[^\s]+')
      RFC_PORT=$(echo "$RESOURCE_OUTPUT" | grep -E "^\s*rfc_port:" | grep -oP 'rfc_port: \K[^\s]+')
      export RESOURCE_ID=$(echo "$RESOURCE_OUTPUT" | grep -E "^\s*resource_id:" | grep -oP 'resource_id: \K[^\s]+')
      export DEVICE_PORT="rfc2217://${DEVICE_IP}:${RFC_PORT}"
      export RESOURCE_CONFIG_FILE=$(echo "$RESOURCE_OUTPUT" | grep -oP 'Resource data saved to: \K[^\s]+')
      echo "Device: $DEVICE_PORT | Config: $RESOURCE_CONFIG_FILE | Resource ID: $RESOURCE_ID"
      echo "$RESOURCE_ID" > ${CI_PROJECT_DIR}/.resource_id
      echo "${CI_JOB_ID}" > ${CI_PROJECT_DIR}/.job_id
     
    else
      echo "ERROR: Failed to grab ${TARGET} resource for job ${CI_JOB_ID}"
      echo "Resource allocation failed"      
      exit 1
    fi

.release_hardware: &release_hardware
  - |
    if [ -f ${CI_PROJECT_DIR}/.resource_id ] && [ -f ${CI_PROJECT_DIR}/.job_id ]; then
      RESOURCE_ID=$(cat ${CI_PROJECT_DIR}/.resource_id)
      JOB_ID=$(cat ${CI_PROJECT_DIR}/.job_id)
      echo "Releasing resource: $RESOURCE_ID for job: $JOB_ID"
      python3 ${CI_PROJECT_DIR}/resource-pool-cli.py release --resource-id ${RESOURCE_ID} --user-id ${JOB_ID} || true
      rm -f ${CI_PROJECT_DIR}/.resource_id ${CI_PROJECT_DIR}/.job_id
    else
      echo "No resource to release (resource ID file not found)"
    fi
    
.flash_firmware: &flash_firmware
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py erase-flash ${RESOURCE_CONFIG_FILE}
  - |
    if [ "$TARGET" == "esp32" ]; then
      BOOTLOADER_ADDR="0x1000"
    else
      BOOTLOADER_ADDR="0x0"
    fi
    python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/bootloader/bootloader.bin ${BOOTLOADER_ADDR} ${RESOURCE_CONFIG_FILE}
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/partition_table/partition-table.bin 0x8000 ${RESOURCE_CONFIG_FILE}
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash build/${APP_BIN} 0x10000 ${RESOURCE_CONFIG_FILE}

.flash_rm_claimed_data: &flash_rm_claimed_data
  - echo "Flashing RainMaker claimed data to device at 0x340000..."
  - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py flash "${CLAIM_DATA_PATH}/${MAC_ADDR}.bin" 0x340000 ${RESOURCE_CONFIG_FILE}

.start_device_monitor: &start_device_monitor
  - mkdir -p ${STRESS_TEST_REPORT_DIR}
  - export LOG_FILE="${STRESS_TEST_REPORT_DIR}/device_logs_${TARGET}.txt"
  - cd $CI_PROJECT_DIR/examples/diagnostics_smoke_test
  - nohup script -q -c "idf.py monitor -p ${DEVICE_PORT}" "${LOG_FILE}" </dev/null >/dev/null 2>&1 &
  - sleep 2
  - echo "Log monitoring started"

.stop_device_monitor: &stop_device_monitor
  - pkill -9 -f "idf.py monitor" || true

.generate_rainmaker_claim_data: &generate_rainmaker_claim_data
  - python3 -m pip install esp-rainmaker-cli
  - esp-rainmaker-cli login --email "${UT_USERNAME}" --password "${UT_PASSWORD}"
  - esp-rainmaker-cli claim --mac "${MAC_ADDR}" --outdir "${CI_PROJECT_DIR}/.rainmaker_claim" || true
  - export CLAIM_DATA_PATH=$(find "${CI_PROJECT_DIR}/.rainmaker_claim" -type d -name "${MAC_ADDR}" | head -n 1)
  - export NODE_ID=$(cat "${CLAIM_DATA_PATH}/node.info")
  - echo "$NODE_ID"

.build_stress_test: &build_stress_test
  - cd $CI_PROJECT_DIR/examples/diagnostics_smoke_test
  - rm -rf build sdkconfig
  - echo "CONFIG_EXAMPLE_WIFI_SSID=\"${UT_WIFI_SSID}\"" >> sdkconfig.defaults
  - echo "CONFIG_EXAMPLE_WIFI_PASSWORD=\"${UT_WIFI_PASSWORD}\"" >> sdkconfig.defaults
  - echo CONFIG_ESP_INSIGHTS_TRANSPORT_MQTT=y >> sdkconfig.defaults
  - echo $UT_InsightsAuthKeyToken > main/insights_auth_key.txt
  - idf.py set-target $TARGET
  - idf.py build

.build_minimal_diagnostics: &build_minimal_diagnostics
  # Building minimal_diagnostics app - Started
  - echo Building minimal_diagnostics app - Started
  - ls
  - cd $CI_PROJECT_DIR/examples/minimal_diagnostics
  # Additional configs for CI build
  - cat sdkconfig.ci >> sdkconfig.defaults
  - echo Running idf.py
  - idf.py build
  - echo Building minimal_diagnostics app - Done
  # Building minimal_diagnostics app - Done
  # Copying minimal_diagnostics.bin to esp-insights-bins-${CI_JOB_ID}/
  - echo Copy minimal_diagnostics.bin to esp-insights-bins-${CI_JOB_ID}/
  - cp $CI_PROJECT_DIR/examples/minimal_diagnostics/build/minimal_diagnostics.bin $CI_PROJECT_DIR/esp-insights-bins-${CI_JOB_ID}/

.build_diagnostics_smoke_test: &build_diagnostics_smoke_test
  - echo Building diagnostics_smoke_test app - Started
  - ls
  - cd $CI_PROJECT_DIR/examples/diagnostics_smoke_test
  # Build this example for HTTPS transport, insights_auth_key.txt file is required
  - touch main/insights_auth_key.txt
  # Additional configs for CI build
  - cat sdkconfig.ci >> sdkconfig.defaults
  - for TARGET in $EXAMPLE_TARGETS; do
  - echo Building diagnostics_smoke_test for $TARGET
  - idf.py set-target $TARGET
  - idf.py build
  # Copying diagnostics smoke binary for esp-idf master and target ESP32 to artifacts
  - echo Copy diagnostics_smoke_test.bin to esp-insights-bins-${CI_JOB_ID}/
  - mkdir -p $CI_PROJECT_DIR/esp-insights-bins-${CI_JOB_ID}/diagnostics_smoke_test/$TARGET/
  - cp $CI_PROJECT_DIR/examples/diagnostics_smoke_test/build/diagnostics_smoke_test.bin $CI_PROJECT_DIR/esp-insights-bins-${CI_JOB_ID}/diagnostics_smoke_test/$TARGET/
  - rm -rf build sdkconfig
  - done
  - echo Building diagnostics_smoke_test Done
  # Generating zip file for binaries generated
  - cd $CI_PROJECT_DIR
  - echo Generating zip file for binaries generated
  - tar -zcvf esp-insights-bins-${CI_JOB_ID}.zip esp-insights-bins-${CI_JOB_ID}/

.build_template:
  stage: build
  image: espressif/idf:latest
  tags:
    - build
  variables:
    PEDANTIC_FLAGS: "-Werror -Werror=deprecated-declarations -Wno-error=cpp -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
    EXTRA_CFLAGS: "${PEDANTIC_FLAGS}"
    EXTRA_CXXFLAGS: "${PEDANTIC_FLAGS}"
  artifacts:
    paths:
      - $CI_PROJECT_DIR/esp-insights-bins-${CI_JOB_ID}.zip
    expire_in: 6 mos
  script:
    # Do NOT upgrade idf-component-manager — each IDF version ships with a
    # compatible version. Upgrading breaks older IDFs (e.g. v5.2 requires
    # interface_version 4/5, v5.5 requires ~=2.2).
    # build example
    - for APP in $APP_BUILD; do
    - if [[ "$APP_BUILD" == "all" || "$APP" == "minimal_diagnostics" ]]; then
    - *build_minimal_diagnostics
    - fi
    - if [[ "$APP_BUILD" == "all" || "$APP" == "diagnostics_smoke_test" ]]; then
    - *build_diagnostics_smoke_test
    - fi
    - done
    - echo Build Complete for $APP_BUILD

build_idf_v5.1:
  extends: .build_template
  image: espressif/idf:release-v5.1
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2"

build_idf_v5.2:
  extends: .build_template
  image: espressif/idf:release-v5.2
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2"

build_idf_v5.3:
  extends: .build_template
  image: espressif/idf:release-v5.3
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2"

build_idf_v5.4:
  extends: .build_template
  image: espressif/idf:release-v5.4
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2"

build_idf_v5.5:
  extends: .build_template
  image: espressif/idf:release-v5.5
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2"

build_idf_v6.0:
  extends: .build_template
  image: espressif/idf:release-v6.0
  variables:
    EXAMPLE_TARGETS: "esp32 esp32s2 esp32c3 esp32s3 esp32c6 esp32c2"

.unit_test_template:
  image: espressif/idf:release-v5.4
  variables:
    TARGET: ${TARGET}
    APP_BIN: "esp_insights_test.bin"
  stage: test
  dependencies: []
  needs: []
  timeout: 30m
  tags:
    - idf_unit_test_runner
  before_script:
    # acquire esp device
    - *setup_hardware
  script:
    # build unit test application
    - echo $IDF_PATH
    - cd $CI_PROJECT_DIR
    - cd unit_test_app
    - idf.py set-target $TARGET
    - idf.py build

    # flash above built application
    - *flash_firmware

    # start the rfc2217 server
    - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py rfc2217-server ${RESOURCE_CONFIG_FILE}

    # run the unit tests
    - python3 run_test.py $DEVICE_PORT --sequence tests_sequence.json --log-file result.txt

    # check the result.txt for any FAIL entries
    - if grep -q FAIL result.txt; then
    - echo "❌ Found FAIL entries in result.txt"
    - exit 1
    - else
    - echo "✅ No FAIL entries found"
    - fi
  after_script:
      - *release_hardware
  artifacts:
    when: always
    paths:
      - unit_test_app/result.txt

unit_test_esp32C3:
  extends: .unit_test_template
  variables:
    TARGET: "esp32c3"

unit_test_esp32:
  extends: .unit_test_template
  variables:
    TARGET: "esp32"

.stress_test_template:
  image: espressif/idf:release-v5.4
  variables:
    TARGET: ${TARGET}
    APP_BIN: "diagnostics_smoke_test.bin"
    UT_PASSWORD: $PROD_PASSWORD
    UT_USERNAME: $PROD_USERNAME
    UT_BASE_URI: $PROD_BASE_URI
    UT_DIAG_URI: $PROD_DIAG_URI
    UT_InsightsAuthKeyToken: $PROD_InsightsAuthKeyToken
    UT_WIFI_SSID: $UT_WIFI_SSID
    UT_WIFI_PASSWORD: $UT_WIFI_PASSWORD
    PYTHON_TESTS_PATH: "$CI_PROJECT_DIR/components/esp_diag_data_store/test/python_tests"
    STRESS_TEST_REPORT_DIR: "$CI_PROJECT_DIR/Test_Report_ST/${TARGET}"
  stage: test
  dependencies: []
  needs: []
  timeout: 2h
  tags:
    - idf_unit_test_runner
  before_script:
    # Generate claim certificate and extract node ID
    - *generate_rainmaker_claim_data

    # acquire esp device
    - *setup_hardware
  script:
    # build diagnostics_smoke_test application
    - *build_stress_test

    # Flash the firmware
    - cd $CI_PROJECT_DIR/examples/diagnostics_smoke_test
    - *flash_firmware
    
    # Flash the claim data
    - *flash_rm_claimed_data

    # start the rfc2217 server
    - python3 ${CI_PROJECT_DIR}/resource-pool-cli.py rfc2217-server ${RESOURCE_CONFIG_FILE}

    # Start monitoring device logs in background
    - *start_device_monitor

    # Run stress tests
    - cd $PYTHON_TESTS_PATH
    - python3 -m pip install -r python_test_requirement.txt
    - python3 stress_tests.py --username=${UT_USERNAME} --password=${UT_PASSWORD} --base_uri=${UT_BASE_URI} --diag_uri=${UT_DIAG_URI} --node_id=${NODE_ID} --output=${STRESS_TEST_REPORT_DIR}

  after_script:
    - *release_hardware
    - *stop_device_monitor
    - esp-rainmaker-cli logout || true

  artifacts:
    when: always
    paths:      
      - ${STRESS_TEST_REPORT_DIR}/

stress_test_esp32:
  extends: .stress_test_template
  variables:
    TARGET: "esp32"
    MAC_ADDR: "ABCABCABCABC"

stress_test_esp32c3:
  extends: .stress_test_template
  variables:
    TARGET: "esp32c3"
    MAC_ADDR: "ABCDABCDABCD"

build_docs:
  stage: build
  image: $ESP_DOCS_ENV_IMAGE
  tags:
    - build_docs
  artifacts:
    paths:
      - docs/_build/*/*/*.txt
      - docs/_build/*/*/html/*
    expire_in: 4 days
  # No cleaning when the artifacts
  after_script: []
  script:
    - cd docs
    - pip install -r requirements.txt
    - build-docs -l en -t esp32

.deploy_docs_template:
  stage: deploy
  image: $ESP_DOCS_ENV_IMAGE
  tags:
    - deploy_docs
  needs:
    - build_docs
  script:
    - source ${CI_PROJECT_DIR}/docs/utils.sh
    - add_doc_server_ssh_keys $DOCS_DEPLOY_PRIVATEKEY $DOCS_DEPLOY_SERVER $DOCS_DEPLOY_SERVER_USER
    - export GIT_VER=$(git describe --always)
    - pip install -r ${CI_PROJECT_DIR}/docs/requirements.txt
    - deploy-docs

deploy_docs_preview:
  extends:
    - .deploy_docs_template
  except:
    refs:
      - main
  variables:
    TYPE: "preview"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PREVIEW_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PREVIEW_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PREVIEW_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PREVIEW_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PREVIEW_URL_BASE"

deploy_docs_production:
  extends:
    - .deploy_docs_template
  only:
    refs:
      - main
  variables:
    TYPE: "production"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PROD_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PROD_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PROD_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PROD_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PROD_URL_BASE"

push_main_to_github:
  stage: deploy
  image: espressif/idf:release-v5.5
  tags:
    - build
  when: on_success
  dependencies: []
  only:
    - main
  script:
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -n $GH_PUSH_KEY > ~/.ssh/id_rsa_base64
    - base64 --decode --ignore-garbage ~/.ssh/id_rsa_base64 > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host github.com\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
    - git remote remove github &>/dev/null || true
    - git remote add github git@github.com:espressif/esp-insights.git
    - git push github "${CI_COMMIT_SHA}:refs/heads/${CI_COMMIT_REF_NAME}"

include:
  - '.gitlab/ci/pre_commit.yml'
